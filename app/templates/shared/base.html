<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "PMO Resource Platform" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
  {% if user %}
  <div class="app-shell">
    {% include "shared/sidebar.html" %}
    <main class="content">
      <header class="topbar">
        <div>
          <div class="eyebrow">{{ user.role.value.replace("_", " ") }}</div>
          <h1>{{ page_title or "Dashboard" }}</h1>
        </div>
        <form method="post" action="/logout">
          <button class="btn btn-outline-secondary btn-sm"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </form>
      </header>
      {% block content %}{% endblock %}
    </main>
  </div>
  {% else %}
    {% block auth_content %}{% endblock %}
  {% endif %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
